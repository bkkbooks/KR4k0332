body:
  text: 魏春秋黃初元年文帝愈崇宮殿雕飾觀閣取白石英及紫石英五色大石於太行穀城之山起景陽山于芳林園樹松竹草木捕禽獸以克其中于時百役繁興帝躬自掘土率群臣三公以下莫不展力文帝以素書所著典論及詩賦餉孫權又以𥿄寫一通與張昭帝善彈棊能用手巾角時有一書生又能低頭以所冠著葛巾角撇棊劉政投炳原曰窮鳥入懷炳原曰安知斯懷之可入邪明帝時崔林嘗與司空陳群共論冀川人士稱琰為首群以智不存身貶之林曰大丈夫為有邂逅耳即如卿諸人良足貴乎王遇性質訥而好學興平中關中擾亂與兄季中依將軍段煨采梠負販而常挾持經書投間習讀其兄笑之而遇不改阮籍常率意獨駕不由徑路車跡所窮輒慟哭而反
